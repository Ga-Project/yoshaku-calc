name: Deploy to GitHub Pages

# 公開前ゲート → ビルド → Pages 公開を1つの workflow で直列化する。
# secret-scan が落ちたら build は skip され、Pages には何も公開されない

on:
  push:
    branches: [main]

# 最小権限。書き込みが要るのは deploy job のみ（下で job 単位に付与）。
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 平文シークレットの混入を全コミット履歴に対して検査する。
  # build はこの job を needs にするため、ここで落ちると公開に進まない。
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 全コミット履歴を走査する
      - name: Install gitleaks (pinned)
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan full history
        run: gitleaks detect --no-banner --redact

  build:
    name: Build (static export)
    needs: secret-scan # スキャン通過が前提。fail 時は skip され公開されない。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        # プロジェクトページ（owner.github.io/yoshaku-calc/）配信のため
        # アセットをサブパス基準で出力する。
        env:
          PAGES_BASE_PATH: /yoshaku-calc
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
